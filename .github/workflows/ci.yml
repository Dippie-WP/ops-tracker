name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for syntax errors
        run: node --check server/index.js server/db.js server/routes/ops.js server/routes/attachments.js

      - name: Build Docker image (smoke test)
        run: docker build -t ops-tracker:ci .
