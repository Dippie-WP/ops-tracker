name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint commits
        run: |
          npm install -g @commitlint/cli @commitlint/config-conventional
          npx commitlint --from origin/main --to HEAD

  docker-build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/dippie-wp/ops-tracker:${{ github.sha }}
          labels: |
            org.opencontainers.image.title=ops-tracker
            org.opencontainers.image.description=Operations tracker API
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/ops-tracker
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Run container smoke test
        run: |
          docker compose up -d
          sleep 5
          curl -sf http://localhost:5050/api/health
          curl -sf http://localhost:5050/api/ops?status=pending
            || { docker logs "$(docker compose ps -q ops-tracker)"; exit 1; }
          docker compose down
