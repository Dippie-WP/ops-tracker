name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get current tag
        id: version
        run: |
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          echo "current=$CURRENT_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/dippie-wp/ops-tracker:${{ github.sha }}
            ghcr.io/dippie-wp/ops-tracker:${{ steps.version.outputs.current }}
          labels: |
            org.opencontainers.image.title=ops-tracker
            org.opencontainers.image.description=Operations tracker API
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/ops-tracker
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.current }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ steps.version.outputs.current }}
