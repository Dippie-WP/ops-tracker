services:
  ops-tracker:
    build: .
    container_name: ops-tracker
    restart: unless-stopped
    ports:
      - "5050:3000"
    volumes:
      - ops_data:/data
      # Override server files (hot-reload dev) — must not hide node_modules
      - /home/zunaid/ops-tracker/server:/app/server:ro
      - /home/zunaid/ops-tracker/public:/app/public:ro
    environment:
      - PORT=3000
      - EXTERNAL_PORT=5050
      - NODE_ENV=production
      - DATA_DIR=/data

volumes:
  ops_data:
