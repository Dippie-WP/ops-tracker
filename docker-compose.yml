services:
  ops-tracker:
    # Image from GHCR — set IMAGE_TAG env var to override
    # Run with: IMAGE_TAG=9b2af6e7bccc... docker compose up -d
    image: ghcr.io/dippie-wp/ops-tracker:${IMAGE_TAG:-latest}
    container_name: ops-tracker
    restart: unless-stopped
    ports:
      - "5050:3000"
    volumes:
      - ops_data:/data
    environment:
      - PORT=3000
      - EXTERNAL_PORT=5050
      - NODE_ENV=production
      - DATA_DIR=/data

volumes:
  ops_data:
