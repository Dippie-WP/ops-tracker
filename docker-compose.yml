services:
  ops-tracker:
    build: .
    container_name: ops-tracker
    restart: unless-stopped
    ports:
      - "5050:3000"
    volumes:
      - ops_data:/data
    environment:
      - PORT=3000
      - EXTERNAL_PORT=5050
      - NODE_ENV=production
      - DATA_DIR=/data

volumes:
  ops_data:
